<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bada bada bum</title>
    <link rel="icon" href="./assets/img/love.png">
    <link rel="stylesheet" href="./assets/css/loichuc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css">

</head>

<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <a href="heart.html" class="text-muted text-decoration-none">
                            <div class="d-flex align-items-center gap-2 justify-content-center">
                                <span id="namePrincess" class="fw-bold text-pink">Nguyễn văn A</span>
                            </div>
                            <div class="mb-2">
                                Chúc chị luôn luôn xinh đẹp rạng ngời và luôn hạnh phúc trong từng khoảng khắc ạ 🌷
                            </div>
                        </a>

                    </div>
                </div>
            </div>
            <div class="heart"></div>

        </div>
    </div>


    <script>
        const envelope = document.querySelector('.envelope-wrapper');
        envelope.addEventListener('click', () => {
            envelope.classList.toggle('flap');
        });
    </script>


    <script defer src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>
    <script defer src="./assets/js/loichuc.js"></script>
</body>

</html>
